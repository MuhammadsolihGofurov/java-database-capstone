<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Doctor Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-teal-50 flex items-center justify-center min-h-screen font-sans">

<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-teal-100">
    <div class="bg-teal-600 p-8 text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-full mb-4 backdrop-blur-sm">
            <i class="fas fa-user-md text-white text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Doctor Portal</h1>
        <p class="text-teal-100 text-sm mt-1">Smart Clinic Management System</p>
    </div>

    <div class="p-8">
        <form action="#" method="POST" class="space-y-5">
            <div>
                <label for="doctor-id" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Doctor Email or ID</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-teal-500">
                            <i class="fas fa-envelope"></i>
                        </span>
                    <input type="text" id="doctor-id" name="doctor-id" required
                           class="block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 bg-gray-50 text-gray-900 transition-all placeholder:text-gray-400"
                           placeholder="doctor@smartclinic.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5 ml-1">
                    <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                    <a href="#" class="text-xs font-medium text-teal-600 hover:text-teal-500">Forgot?</a>
                </div>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-teal-500">
                            <i class="fas fa-lock"></i>
                        </span>
                    <input type="password" id="password" name="password" required
                           class="block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 bg-gray-50 text-gray-900 transition-all placeholder:text-gray-400"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                    class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl shadow-lg text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 active:scale-95 transition-all uppercase tracking-widest mt-4">
                <i class="fas fa-sign-in-alt mr-2"></i> Access Portal
            </button>
        </form>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="text-center p-3 bg-teal-50 rounded-lg">
                <p class="text-[10px] text-teal-600 uppercase font-bold mb-1">Assistance</p>
                <p class="text-xs text-gray-600">IT Help Desk</p>
            </div>
            <div class="text-center p-3 bg-teal-50 rounded-lg">
                <p class="text-[10px] text-teal-600 uppercase font-bold mb-1">Security</p>
                <p class="text-xs text-gray-600">2FA Enabled</p>
            </div>
        </div>
    </div>

    <div class="bg-gray-50 px-8 py-4 text-center border-t border-gray-100">
        <p class="text-[11px] text-gray-400">Authorized medical personnel only. Session activity is monitored.</p>
    </div>
</div>

</body>
</html>
