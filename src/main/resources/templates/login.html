<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

<div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-xl mb-4 shadow-lg shadow-blue-200">
            <i class="fas fa-clinic-medical text-white text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Smart Clinic</h1>
        <p class="text-slate-500 font-medium">Welcome to Admin Portal</p>
    </div>

    <form action="#" method="POST" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
            <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-user"></i>
                    </span>
                <input type="text" id="username" name="username" required
                       class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50 text-slate-900 transition-all placeholder:text-slate-400"
                       placeholder="Enter admin username">
            </div>
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
            <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                <input type="password" id="password" name="password" required
                       class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50 text-slate-900 transition-all placeholder:text-slate-400"
                       placeholder="••••••••">
            </div>
        </div>

        <div class="flex items-center justify-between text-sm">
            <div class="flex items-center">
                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="remember-me" class="ml-2 block text-slate-600">Remember me</label>
            </div>
            <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Forgot password?</a>
        </div>

        <button type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors uppercase tracking-wider">
            Sign In
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center text-xs text-slate-400">
        <p>&copy; 2026 Smart Clinic Management System. All rights reserved.</p>
    </div>
</div>

</body>
</html>
