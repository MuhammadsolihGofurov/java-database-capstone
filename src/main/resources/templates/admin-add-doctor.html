<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Admin: Add Doctor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex">

<aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 hidden md:flex flex-col">
    <div class="p-6 flex items-center space-x-3 text-white">
        <i class="fas fa-clinic-medical text-2xl text-blue-500"></i>
        <span class="text-xl font-bold tracking-wider">Smart Clinic</span>
    </div>
    <nav class="flex-1 px-4 space-y-2 mt-4">
        <a href="#" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-colors">
            <i class="fas fa-th-large w-5"></i>
            <span>Dashboard</span>
        </a>
        <a href="#" class="flex items-center space-x-3 p-3 rounded-lg bg-blue-600 text-white shadow-lg">
            <i class="fas fa-user-md w-5"></i>
            <span>Doctors Management</span>
        </a>
        <a href="#" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-colors">
            <i class="fas fa-user-injured w-5"></i>
            <span>Patients List</span>
        </a>
        <a href="#" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-slate-800 transition-colors">
            <i class="fas fa-calendar-check w-5"></i>
            <span>Appointments</span>
        </a>
    </nav>
    <div class="p-4 border-t border-slate-800">
        <div class="flex items-center space-x-3 p-2">
            <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold">AD</div>
            <div class="text-xs">
                <p class="text-white font-semibold">System Admin</p>
                <p class="text-slate-500">admin@clinic.com</p>
            </div>
        </div>
    </div>
</aside>

<main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
        <h2 class="text-lg font-semibold text-slate-800">Add New Doctor</h2>
        <div class="flex items-center space-x-4">
            <button class="relative p-2 text-slate-400 hover:text-blue-600">
                <i class="fas fa-bell"></i>
                <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                    <div>
                        <h3 class="text-base font-bold text-slate-800">Doctor Information</h3>
                        <p class="text-xs text-slate-500">Fill in the details to register a new medical professional.</p>
                    </div>
                    <i class="fas fa-id-card text-slate-300 text-2xl"></i>
                </div>

                <form class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700">Full Name</label>
                            <input type="text" placeholder="Dr. John Doe" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700">Specialty</label>
                            <select class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white">
                                <option>Cardiology</option>
                                <option>Neurology</option>
                                <option>Pediatrics</option>
                                <option>Dermatology</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700">Email Address</label>
                            <input type="email" placeholder="john.doe@clinic.com" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-700">Phone Number</label>
                            <input type="tel" placeholder="+1 234 567 890" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-sm font-semibold text-slate-700">Available Time Slots</label>
                        <div class="flex flex-wrap gap-2">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold border border-blue-100">09:00 AM <i class="fas fa-times ml-1 cursor-pointer"></i></span>
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold border border-blue-100">11:30 AM <i class="fas fa-times ml-1 cursor-pointer"></i></span>
                            <button type="button" class="px-3 py-1 border-2 border-dashed border-slate-200 text-slate-400 rounded-full text-xs font-bold hover:border-blue-400 hover:text-blue-500 transition-all">+ Add Slot</button>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 flex justify-end space-x-3">
                        <button type="button" class="px-6 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:bg-slate-100 transition-all">Cancel</button>
                        <button type="submit" class="px-6 py-2.5 rounded-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Save Doctor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
