<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Patient Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-indigo-50 flex items-center justify-center min-h-screen font-sans">

<div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-indigo-100">

        <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-8 text-center text-white">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-2xl mb-4 backdrop-blur-md border border-white/30">
                <i class="fas fa-hand-holding-medical text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Patient Portal</h1>
            <p class="text-indigo-100 text-sm mt-1">Manage your health and appointments</p>
        </div>

        <div class="p-8">
            <form action="#" method="POST" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">Email Address</label>
                    <div class="relative group">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                                <i class="fas fa-at"></i>
                            </span>
                        <input type="email" id="email" name="email" required
                               class="block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 text-gray-900 transition-all placeholder:text-gray-400"
                               placeholder="name@example.com">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5 ml-1">
                        <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                        <a href="#" class="text-xs font-medium text-indigo-600 hover:text-indigo-500">Forgot?</a>
                    </div>
                    <div class="relative group">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                                <i class="fas fa-fingerprint"></i>
                            </span>
                        <input type="password" id="password" name="password" required
                               class="block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 text-gray-900 transition-all placeholder:text-gray-400"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                        class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl shadow-lg text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] transition-all tracking-wide mt-4">
                    Sign In to My Account
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    New patient?
                    <a href="#" class="font-bold text-indigo-600 hover:underline">Create an account</a>
                </p>
            </div>
        </div>

        <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 flex justify-center items-center space-x-4 opacity-60">
            <div class="flex items-center text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                <i class="fas fa-shield-alt mr-1"></i> Secure Data
            </div>
            <div class="h-3 w-[1px] bg-gray-300"></div>
            <div class="flex items-center text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                <i class="fas fa-lock mr-1"></i> HIPAA Compliant
            </div>
        </div>
    </div>

    <p class="text-center mt-6 text-[11px] text-gray-400">
        &copy; 2026 Smart Clinic Health Systems. All rights reserved.
    </p>
</div>

</body>
</html>
